name: macOS-Remote-Desktop

on:
  workflow_dispatch:

jobs:
  macos-vnc:
    runs-on: macos-latest
    timeout-minutes: 3600 

    steps:
      - name: Set Runner Password
        run: |
          # HARDCODED PASSWORD: Change 'Mypassword123!' to whatever you like
          # Using sysadminctl to ensure it works without knowing the "old" password
          sudo sysadminctl -adminUser runner -adminPassword "" -password "Mypassword123!"

      - name: Enable Screen Sharing (VNC)
        run: |
          # 1. Activate and allow all users
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -allowAccessFor -allUsers -privs -all

          # 2. Set the VNC password specifically (matching the one above)
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -configure -clientopts -setvncpw -vncpw "Mypassword123!"

          # 3. Restart the agent
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -restart -agent

          # 4. Disable firewall to prevent connection blocks
          sudo defaults write /Library/Preferences/com.apple.alf globalstate -int 0

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Establish Tailscale Connection
        run: |
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-mac-$(date +%s)
          
          TS_IP=""
          while [ -z "$TS_IP" ]; do
            TS_IP=$(tailscale ip -4)
            sleep 2
          done
          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV

      - name: Connection Details
        run: |
          echo "--------------------------------------"
          echo "ACCESS INFO"
          echo "Address: vnc://${{ env.TAILSCALE_IP }}"
          echo "User: runner"
          echo "Password: Mypassword123!"
          echo "--------------------------------------"

      - name: Keep Alive
        run: |
          while true; do
            echo "Runner is active... Connect via VNC now."
            sleep 300
          done
