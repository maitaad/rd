name: macOS-Remote-Desktop

on:
  workflow_dispatch:

jobs:
  macos-vnc:
    runs-on: macos-latest
    timeout-minutes: 3600 

    steps:
      - name: Set Runner Password
        run: |
          # Use sysadminctl to force the password for the 'runner' user
          sudo sysadminctl -adminUser runner -adminPassword "" -password "Mypassword123!"

      - name: Enable Screen Sharing (VNC)
        run: |
          # 1. Activate Remote Management
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -allowAccessFor -allUsers -privs -all

          # 2. Configure VNC password
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -configure -clientopts -setvncpw -vncpw "Mypassword123!"

          # 3. Restart the agent
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -restart -agent

          # 4. Disable Firewall
          sudo defaults write /Library/Preferences/com.apple.alf globalstate -int 0

      - name: Install Tailscale
        run: |
          brew install tailscale
          # Start the background daemon using brew services (correct for Mac)
          sudo brew services start tailscale
          # Give the daemon a moment to initialize
          sleep 5

      - name: Establish Tailscale Connection
        run: |
          # Use the absolute path for Apple Silicon (/opt/homebrew/bin/tailscale)
          sudo /opt/homebrew/bin/tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-mac-runner

          # Extract IP with retries
          TS_IP=""
          for i in {1..12}; do
            TS_IP=$(/opt/homebrew/bin/tailscale ip -4)
            if [ -n "$TS_IP" ]; then break; fi
            echo "Waiting for Tailscale IP..."
            sleep 5
          done

          if [ -z "$TS_IP" ]; then
            echo "Failed to get Tailscale IP"
            exit 1
          fi
          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV

      - name: Connection Details
        run: |
          echo "------------------------------------------"
          echo "ACCESS INFO"
          echo "VNC Address: vnc://${{ env.TAILSCALE_IP }}"
          echo "Username:    runner"
          echo "Password:    Mypassword123!"
          echo "------------------------------------------"

      - name: Keep Alive
        run: |
          while true; do
            echo "Runner is active. Connect now."
            sleep 300
          done
