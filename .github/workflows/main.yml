name: macOS-Remote-Desktop

on:
  workflow_dispatch:

jobs:
  macos-vnc:
    runs-on: macos-latest
    # macOS runners are more expensive in GitHub Actions minutes; 
    # ensure you monitor your usage.
    timeout-minutes: 3600 

    steps:
      - name: Set Runner Password
        run: |
          # The default runner user has no password. Screen Sharing requires one.
          # Replacing 'Runner123!' with a generated one for security.
          PASSWORD=$(openssl rand -base64 12)
          echo "VNC_PASSWORD=$PASSWORD" >> $GITHUB_ENV
          sudo dscl . -passwd /Users/runner "$PASSWORD"

      - name: Enable Screen Sharing (VNC)
        run: |
          # Enable Remote Management and Screen Sharing
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvncpasswd -vncpasswd $(openssl rand -base64 8) \
            -restart -agent -privs -all
          
          # Explicitly allow Screen Sharing through the firewall
          sudo /usr/libexec/ApplicationFirewall/socketfilterproxy --add /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/MacOS/ARDAgent
          sudo /usr/libexec/ApplicationFirewall/socketfilterproxy --blockapp /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/MacOS/ARDAgent -0

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Establish Tailscale Connection
        run: |
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-mac-$(date +%s)
          
          # Loop until IP is assigned
          TS_IP=""
          while [ -z "$TS_IP" ]; do
            TS_IP=$(tailscale ip -4)
            sleep 2
          done
          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV

      - name: Connection Details
        run: |
          echo "--------------------------------------"
          echo "ACCESS INFO"
          echo "Address: vnc://${{ env.TAILSCALE_IP }}"
          echo "User: runner"
          echo "Password: ${{ env.VNC_PASSWORD }}"
          echo "--------------------------------------"

      - name: Keep Alive
        run: |
          while true; do
            echo "Keep-alive: $(date)"
            sleep 300
          done
